<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 100" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&amp;display=swap');
    </style>
  </defs>
  <!-- Light background -->
  <rect width="600" height="100" rx="8" fill="#FAFAFA"/>
  <!-- BROODWAR text -->
  <text x="40" y="62" font-family="'Orbitron', sans-serif" font-weight="900" font-size="42" letter-spacing="1.68" fill="#0c1120">BROODWAR</text>
  <!-- LIVE box — inverted for light mode -->
  <rect x="410" y="28" width="140" height="44" rx="2" fill="#0c1120"/>
  <text x="444" y="60" font-family="'Orbitron', sans-serif" font-weight="900" font-size="23" letter-spacing="1.38" fill="white" transform="skewX(-8)" style="paint-order: stroke; stroke: white; stroke-width: 0.7px;">LIVE</text>
</svg>
