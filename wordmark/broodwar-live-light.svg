<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 60" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&amp;display=swap');
    </style>
  </defs>
  <!-- BROODWAR text — light (for dark backgrounds) -->
  <text x="0" y="44" font-family="'Orbitron', sans-serif" font-weight="900" font-size="42" letter-spacing="1.68" fill="#EDEDED">BROODWAR</text>
  <!-- LIVE box — white bg, navy text, skewed -->
  <rect x="370" y="8" width="140" height="44" rx="2" fill="white"/>
  <text x="404" y="40" font-family="'Orbitron', sans-serif" font-weight="900" font-size="23" letter-spacing="1.38" fill="#0c1120" transform="skewX(-8)" style="paint-order: stroke; stroke: #0c1120; stroke-width: 0.7px;">LIVE</text>
</svg>
